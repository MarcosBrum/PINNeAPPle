run_name: native_pinn_flow_obstacle_2d

backend:
  name: pinneaple_native

train:
  device: cpu         # ou cuda
  epochs: 20000
  lr: 0.001
  seed: 0
  log_every: 500
  weights:
    pde: 1.0
    bc: 10.0

arena:
  n_collocation: 4096
  n_boundary: 2048

model:
  hidden: [256, 256, 256, 256]
  activation: tanh