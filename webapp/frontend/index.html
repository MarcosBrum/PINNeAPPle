<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pinneaple</title>
    <style>
      body { margin:0; font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial; background:#0b0e14; color:#e6e8ee; }
      .panel { background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03)); border: 1px solid rgba(255,255,255,.10); border-radius: 16px; padding: 16px; }
      .btn { background: rgba(255,255,255,.10); border: 1px solid rgba(255,255,255,.18); color:#e6e8ee; padding:10px 12px; border-radius: 12px; cursor:pointer; }
      .btn:hover { background: rgba(255,255,255,.14); }
      .btn2 { background: transparent; border: 1px solid rgba(255,255,255,.14); color:#e6e8ee; padding:10px 12px; border-radius: 12px; cursor:pointer; }
      .btn2:hover { background: rgba(255,255,255,.06); }
      input, select, textarea { width:100%; background: rgba(255,255,255,.06); color:#e6e8ee; border: 1px solid rgba(255,255,255,.10); border-radius: 12px; padding: 10px; }
      textarea { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; }
      a { color:#a9c7ff; text-decoration:none; }
      a:hover { text-decoration: underline; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
