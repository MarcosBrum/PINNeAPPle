#         - [64, 64, 64, 64]
#         - [128, 128, 128, 128]
#     activation:
#       values: [tanh, silu, gelu]
#     lr:
#       values: [0.001, 0.0005, 0.0001]
#     # Or use a range for random/Bayesian sweeps:
#     # lr:
#     #   min: 1.0e-4
#     #   max: 1.0e-2
#     #   log: true               # log-uniform sampling
#   best_metric: rel_l2
#   best_direction: minimize      # minimize | maximize


