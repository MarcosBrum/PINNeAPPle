bundle_schema_version: "1.1"

required_files:
  - "bundle/geometry.stl"
  - "bundle/conditions.json"
  - "bundle/manifest.json"
  - "derived/points_boundary.parquet"
  - "derived/points_collocation.parquet"
  - "derived/sensors_points.parquet"
  - "derived/line_points.parquet"

sensors_parquet:
  required_columns: ["x", "y", "z", "T", "scenario_id", "split"]
  optional_columns: ["t", "geometry_id", "k"]

splits:
  allowed: ["train", "val", "test"]
  split_key: "split"
  group_key: "scenario_id"

conditions_json:
  required_regions: ["inlet", "outlet", "walls", "obstacle"]

manifest_json:
  required_keys:
    - "problem_id"
    - "pde"
    - "domain"
    - "fields"
    - "weights"